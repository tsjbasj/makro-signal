<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Makro Signal</title>
  <!-- v1.3: minimalistisk redesign — ISM PMI auto fra FRED med manuel fallback -->
  <style>
    :root {
      --bg:     #0c0c0f;
      --text:   #d0d4dc;
      --muted:  #3e4552;
      --border: #181b22;
      --green:  #22c55e;
      --red:    #ef4444;
      --amber:  #f59e0b;
      --font:   'Courier New', Courier, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 44px 24px 88px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 620px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid var(--border);
      padding-bottom: 18px;
      margin-bottom: 88px;
    }
    .logo {
      font-size: 0.72rem;
      letter-spacing: 0.35em;
      color: var(--muted);
      text-transform: uppercase;
    }
    #timestamp {
      font-size: 0.68rem;
      color: var(--muted);
    }

    main { width: 100%; max-width: 620px; }

    /* ── Signal ── */
    #signal-area {
      text-align: center;
      margin-bottom: 80px;
    }
    .signal-question {
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    #signal-text {
      font-size: 6.5rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      line-height: 1;
      color: var(--green);
      transition: color 0.3s;
    }
    #signal-text.sig-nej  { color: var(--red); }
    #signal-text.sig-vent { color: var(--amber); }

    #signal-rule {
      width: 48px;
      height: 1px;
      background: var(--green);
      margin: 22px auto 0;
      transition: background 0.3s;
    }
    #signal-rule.sig-nej  { background: var(--red); }
    #signal-rule.sig-vent { background: var(--amber); }

    #niveau-text {
      margin-top: 16px;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      color: var(--muted);
      text-transform: uppercase;
      min-height: 1em;
    }
    #niveau-text.on { color: var(--text); }

    /* ── Metrics ── */
    #metrics-container {
      border-top: 1px solid var(--border);
    }
    .metric-row {
      display: grid;
      grid-template-columns: 1fr 72px 72px;
      align-items: center;
      gap: 20px;
      padding: 17px 0;
      border-bottom: 1px solid var(--border);
    }
    .metric-name {
      font-size: 0.73rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .metric-value {
      font-size: 0.95rem;
      font-weight: bold;
      text-align: right;
      color: var(--text);
    }
    .metric-value.c-warn { color: var(--red); }
    .metric-value.c-mid  { color: var(--amber); }
    .metric-value.c-ok   { color: var(--green); }
    .bar-track {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 1px;
      transition: width 1s ease;
    }
    .bar-fill.warn { background: var(--red); }
    .bar-fill.mid  { background: var(--amber); }

    .fred-badge {
      font-size: 0.58rem;
      color: var(--green);
      margin-left: 7px;
      letter-spacing: 0.1em;
      opacity: 0.7;
    }
    .ism-edit-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font);
      font-size: 0.62rem;
      cursor: pointer;
      padding: 0;
      margin-left: 8px;
      letter-spacing: 0.08em;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .ism-edit-btn:hover { color: var(--text); }

    /* ── ISM override panel ── */
    #ism-input-row {
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      display: none;
    }
    #ism-input-row label {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      display: block;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    #ism-input-row input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--muted);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.9rem;
      padding: 4px 0;
      width: 80px;
      outline: none;
    }
    #ism-input-row button {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font);
      font-size: 0.65rem;
      cursor: pointer;
      margin-left: 16px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    #ism-input-row button:hover { color: var(--text); }
    #ism-date-note {
      font-size: 0.6rem;
      color: var(--muted);
      margin-top: 8px;
    }

    /* ── Footer ── */
    .footer-row {
      margin-top: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #cache-note {
      font-size: 0.62rem;
      color: var(--muted);
    }
    #refresh-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font);
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      cursor: pointer;
      text-transform: uppercase;
      padding: 0;
    }
    #refresh-btn:hover { color: var(--text); }
    #refresh-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    /* ── Loader ── */
    #loader {
      text-align: center;
      padding: 100px 0;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.35em;
    }
    #loader .dot { animation: blink 1.4s infinite; }
    #loader .dot:nth-child(2) { animation-delay: 0.45s; }
    #loader .dot:nth-child(3) { animation-delay: 0.9s; }
    @keyframes blink { 0%,80%,100%{opacity:0.1} 40%{opacity:0.9} }
    .hidden { display: none !important; }

    @media (max-width: 480px) {
      #signal-text { font-size: 4.5rem; }
      header { margin-bottom: 64px; }
      .metric-row { grid-template-columns: 1fr 64px; }
      .metric-row .bar-track { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Makro Signal</div>
  <div id="timestamp">—</div>
</header>

<main>
  <div id="loader">HENTER<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>

  <div id="content" class="hidden">

    <div id="signal-area">
      <div class="signal-question">Køb ekstra ind i markedet nu?</div>
      <div id="signal-text">—</div>
      <div id="signal-rule"></div>
      <div id="niveau-text"></div>
    </div>

    <div id="metrics-container"></div>

    <div id="ism-input-row">
      <label>Manuel override — ISM Manufacturing PMI</label>
      <div>
        <input id="ism-val-input" type="number" step="0.1" min="30" max="70" placeholder="f.eks. 49.3" />
        <button id="ism-save-btn">Gem</button>
      </div>
      <div id="ism-date-note"></div>
    </div>

    <div class="footer-row">
      <div id="cache-note"></div>
      <button id="refresh-btn">⟳ Opdater</button>
    </div>

  </div>
</main>

<script>
const CACHE_KEY   = 'mks_v3_data';
const ISM_KEY     = 'mks_ism_manual';
const CACHE_TTL   = 24 * 60 * 60 * 1000;
const ISM_TTL     = 35 * 24 * 60 * 60 * 1000;

function $(id) { return document.getElementById(id); }

// ── Cache ─────────────────────────────────────────────────────────────────
function saveCache(data) {
  localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));
}
function loadCache() {
  try {
    const { ts, data } = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null') || {};
    if (ts && Date.now() - ts < CACHE_TTL) return { data, age: Date.now() - ts };
  } catch(_) {}
  return null;
}
function fmtAge(ms) {
  const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000);
  return h > 0 ? `Cache: ${h}t ${m}m gammel` : `Cache: ${m}m gammel`;
}

// ── ISM manual store ──────────────────────────────────────────────────────
function saveISM(val) {
  localStorage.setItem(ISM_KEY, JSON.stringify({ val, ts: Date.now(), source: 'manual' }));
}
function loadISM() {
  try {
    const obj = JSON.parse(localStorage.getItem(ISM_KEY) || 'null') || {};
    if (obj.val && obj.ts && Date.now() - obj.ts < ISM_TTL)
      return { val: parseFloat(obj.val), ts: obj.ts, source: 'manual' };
  } catch(_) {}
  return null;
}

// ── Proxy fetch ───────────────────────────────────────────────────────────
async function proxyFetch(url) {
  const res = await fetch(`/api/fetch?url=${encodeURIComponent(url)}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res;
}

// ── Data fetchers ─────────────────────────────────────────────────────────
async function fetchFearGreed() {
  const res  = await proxyFetch('https://production.dataviz.cnn.io/index/fearandgreed/graphdata');
  const json = await res.json();
  const score = json?.fear_and_greed?.score;
  if (score == null) throw new Error('Ingen F&G score');
  return parseFloat(score);
}

async function fetchSP500() {
  const res  = await proxyFetch('https://stooq.com/q/d/l/?s=%5Espx&i=d');
  const text = await res.text();
  const rows = text.trim().split('\n').filter(r => r && !r.startsWith('Date'));
  if (rows.length < 100) throw new Error('For lidt S&P data');
  const closes = rows.map(r => parseFloat(r.split(',')[4]));
  const latest = closes[closes.length - 1];
  const high52 = Math.max(...closes.slice(-252));
  return { latest, high52, drawdown: (latest / high52 - 1) * 100 };
}

async function fetchISM() {
  const url = 'https://api.stlouisfed.org/fred/series/observations' +
    '?series_id=NAPM&file_type=json&sort_order=desc&limit=5';
  const res  = await proxyFetch(url);
  const json = await res.json();
  const obs = json?.observations?.find(o => o.value && o.value !== '.' && !isNaN(parseFloat(o.value)));
  if (!obs) throw new Error('Ingen NAPM data fra FRED');
  return {
    val: parseFloat(obs.value),
    ts:  new Date(obs.date).getTime(),
    source: 'auto'
  };
}

// ── Decision engine ───────────────────────────────────────────────────────
function computeSignal({ fg, sp, ism }) {
  const spPct = sp.drawdown;
  const ismVal = ism?.val ?? null;

  const jaConditions = [
    spPct <= -12,
    fg    <= 35,
    ismVal != null && ismVal <= 48,
  ];
  const nejConditions = [
    spPct > -8,
    fg    > 45,
    ismVal == null || ismVal >= 50,
  ];

  const isJA  = jaConditions.some(Boolean);
  const isNEJ = nejConditions.every(Boolean);
  let signal  = isJA ? 'JA' : isNEJ ? 'NEJ' : 'VENT';

  let niveau = '';
  if (spPct <= -25)                    niveau = 'Niveau: Stort';
  else if (spPct <= -18 || fg <= 25)   niveau = 'Niveau: 25%';
  else if (isJA)                       niveau = 'Niveau: 12,5%';

  return { signal, niveau };
}

// ── Render ────────────────────────────────────────────────────────────────
function render({ fg, sp, ism }, fromCache, cacheAge) {
  const { signal, niveau } = computeSignal({ fg, sp, ism });
  const sigKey = signal.toLowerCase();

  const sigEl = $('signal-text');
  sigEl.textContent = signal;
  sigEl.className   = `sig-${sigKey}`;

  const rule = $('signal-rule');
  rule.className = `sig-${sigKey}`;

  const niv = $('niveau-text');
  niv.textContent = niveau;
  niv.className   = niveau ? 'on' : '';

  // Metrics
  const ismVal = ism?.val ?? null;
  const ismAge = ism?.ts ? new Date(ism.ts).toLocaleDateString('da-DK') : null;

  const rows = [
    {
      name: 'S&P 500 drawdown (52-ugers high)',
      display: `${sp.drawdown.toFixed(1)}%`,
      barPct: Math.min(100, Math.abs(sp.drawdown) / 30 * 100),
      trigger: sp.drawdown <= -12,
      warn:    sp.drawdown <= -18,
    },
    {
      name: 'CNN Fear & Greed Index',
      display: `${fg.toFixed(0)} / 100`,
      barPct: Math.min(100, (100 - fg) / 100 * 100),
      trigger: fg <= 35,
      warn:    fg <= 25,
    },
    {
      name: 'ISM Manufacturing PMI',
      display: ismVal != null ? ismVal.toFixed(1) : 'N/A',
      barPct: ismVal != null ? Math.min(100, Math.max(0, (60 - ismVal) / 15 * 100)) : 0,
      trigger: ismVal != null && ismVal <= 48,
      warn:    ismVal != null && ismVal <= 45,
      manual:  true,
      source:  ism?.source || null,
    },
  ];

  const container = $('metrics-container');
  container.innerHTML = '';
  rows.forEach(r => {
    const barCls = r.warn ? 'warn' : r.trigger ? 'mid' : '';
    const valCls = r.warn ? 'c-warn' : r.trigger ? 'c-mid' : '';
    const fredBadge = r.manual && r.source === 'auto'
      ? `<span class="fred-badge">FRED</span>` : '';
    const editBtn = r.manual
      ? `<button class="ism-edit-btn" onclick="toggleISMInput()">rediger</button>` : '';

    container.innerHTML += `
      <div class="metric-row">
        <div class="metric-name">${r.name}${fredBadge}${editBtn}</div>
        <div class="metric-value ${valCls}">${r.manual && ismVal == null ? '<span style="color:var(--muted)">N/A</span>' : r.display}</div>
        <div><div class="bar-track"><div class="bar-fill ${barCls}" style="width:${Math.max(2, r.barPct)}%"></div></div></div>
      </div>`;
  });

  // Timestamps
  const now = new Date();
  $('timestamp').textContent = `${now.toLocaleDateString('da-DK')} ${now.toLocaleTimeString('da-DK', {hour:'2-digit',minute:'2-digit'})}`;
  $('cache-note').textContent = fromCache ? fmtAge(cacheAge) : 'Live data';

  if (ismVal != null) $('ism-val-input').value = ismVal;
  if (ismAge) $('ism-date-note').textContent = `Sidst sat: ${ismAge}`;

  $('loader').classList.add('hidden');
  $('content').classList.remove('hidden');
}

// ── ISM manual input ──────────────────────────────────────────────────────
window.toggleISMInput = function() {
  const row = $('ism-input-row');
  row.style.display = row.style.display === 'block' ? 'none' : 'block';
};

$('ism-save-btn').addEventListener('click', () => {
  const raw = parseFloat($('ism-val-input').value);
  if (isNaN(raw) || raw < 30 || raw > 70) {
    alert('Indtast en gyldig PMI-værdi (30–70)');
    return;
  }
  saveISM(raw);
  $('ism-input-row').style.display = 'none';
  loadData(true);
});

// ── Main load ─────────────────────────────────────────────────────────────
async function loadData(force = false) {
  $('refresh-btn').disabled = true;

  if (!force) {
    const cached = loadCache();
    if (cached) {
      const ism = cached.data.ismAuto || loadISM();
      render(Object.assign({}, cached.data, { ism }), true, cached.age);
      $('refresh-btn').disabled = false;
      return;
    }
  }

  $('loader').classList.remove('hidden');
  $('content').classList.add('hidden');

  try {
    const [fg, sp, ismAuto] = await Promise.all([
      fetchFearGreed(),
      fetchSP500(),
      fetchISM().catch(e => { console.warn('FRED ISM fejlede:', e.message); return null; }),
    ]);

    const ism = ismAuto || loadISM();
    const data = { fg, sp, ismAuto };
    saveCache(data);
    render(Object.assign({}, data, { ism }), false, 0);
  } catch(err) {
    $('loader').classList.add('hidden');
    const cached = loadCache();
    if (cached) {
      const ism = cached.data.ismAuto || loadISM();
      render(Object.assign({}, cached.data, { ism }), true, cached.age);
    } else {
      $('content').classList.remove('hidden');
      alert(`Datafejl: ${err.message}`);
    }
  } finally {
    $('refresh-btn').disabled = false;
  }
}

$('refresh-btn').addEventListener('click', () => loadData(true));
loadData();
</script>
</body>
</html>
