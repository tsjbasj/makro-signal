<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Makro Signal</title>
  <!-- v1.5: market-dashboard design-system -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #080c14;
      --surface:        rgba(255,255,255,0.03);
      --border:         rgba(255,255,255,0.07);
      --border-bright:  rgba(255,255,255,0.13);
      --text:           #e2e8f0;
      --muted:          #64748b;
      --dim:            #334155;
      --green:          #22c55e;
      --red:            #ef4444;
      --amber:          #f59e0b;
      --blue:           #6366f1;
      --font-serif:     'DM Serif Display', Georgia, serif;
      --font-mono:      'DM!Mono', 'Courier New', monospace;
      --font-sans:      'Syne', system-ui, sans-serif;
    }

    body {
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(99,102,241,0.12), transparent),
        radial-gradient(ellipse 50% 30% at 100% 80%,  rgba(34,197,94,0.04),  transparent),
        var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 720px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 48px;
    }
    .logo {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.35em;
      color: var(--muted);
      text-transform: uppercase;
    }
    #timestamp {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: var(--dim);
      letter-spacing: 0.05em;
    }

    /* ── Layout ── */
    main {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Card base ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(255,255,255,0.025) 0%, transparent 60%);
      pointer-events: none;
    }
    /* Glow ring */
    .card[data-glow]::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 21px;
      box-shadow:
        0 0 0 1px var(--glow, transparent),
        0 0 40px -8px var(--glow, transparent),
        0 0 80px -20px var(--glow, transparent);
      pointer-events: none;
      opacity: 0.45;
    }

    .card-label {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    /* ── Signal Card ── */
    #signal-card {
      text-align: center;
      padding: 48px 28px 42px;
    }
    .signal-question {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.32em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    #signal-text {
      font-family: var(--font-serif);
      font-size: 7.5rem;
      font-weight: 400;
      line-height: 1;
      color: var(--green);
      transition: color 0.4s;
      animation: signalPulse 4s ease-in-out infinite;
    }
    #signal-text.sig-nej  { color: var(--red); }
    #signal-text.sig-vent { color: var(--amber); }

    #signal-rule {
      width: 44px;
      height: 2px;
      background: var(--green);
      margin: 22px auto 0;
      border-radius: 1px;
      transition: background 0.4s, box-shadow 0.4s;
      box-shadow: 0 0 10px rgba(34,197,94,0.7);
    }
    #signal-rule.sig-nej  { background: var(--red);   box-shadow: 0 0 10px rgba(239,68,68,0.7); }
    #signal-rule.sig-vent { background: var(--amber); box-shadow: 0 0 10px rgba(245,158,11,0.7); }

    #niveau-text {
      margin-top: 16px;
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      color: var(--muted);
      text-transform: uppercase;
      min-height: 1em;
    }
    #niveau-text.on { color: var(--text); }

    @keyframes signalPulse {
      0%, 100% { opacity: 1;    filter: brightness(1);   }
      50%       { opacity: 0.72; filter: brightness(0.88); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Metrics Grid ── */
    #metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px 18px 18px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }
    .metric-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 60%);
      pointer-events: none;
    }
    .metric-card[data-glow]::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 19px;
      box-shadow:
        0 0 0 1px var(--glow, transparent),
        0 0 28px -4px var(--glow, transparent);
      pointer-events: none;
      opacity: 0.38;
    }
    .metric-card .card-label { margin-bottom: 12px; }

    .metric-value {
      font-family: var(--font-serif);
      font-size: 1.9rem;
      font-weight: 400;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 8px;
      transition: color 0.4s;
    }
    .metric-value.c-warn  { color: var(--red); }
    .metric-value.c-mid   { color: var(--amber); }
    .metric-value.c-ok    { color: var(--green); }
    .metric-value.c-muted { color: var(--muted); }

    .metric-desc {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      color: var(--dim);
      letter-spacing: 0.06em;
      line-height: 1.5;
    }

    /* ── Progress Bar ── */
    .bar-track {
      height: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 1px;
      overflow: hidden;
      margin-top: 12px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 1px;
      background: var(--green);
      transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
    }
    .bar-fill.warn { background: var(--red); }
    .bar-fill.mid  { background: var(--amber); }

    /* ── SVG Gauge ── */
    .gauge-wrap { margin-top: 6px; }
    #gauge-svg  { display: block; margin: 0 auto; overflow: visible; }

    /* ── Badges & edit ── */
    .fred-badge {
      font-size: 0.5rem;
      color: var(--green);
      margin-left: 6px;
      letter-spacing: 0.1em;
      opacity: 0.75;
      vertical-align: middle;
    }
    .ism-edit-btn {
      background: none;
      border: none;
      color: var(--dim);
      font-family: var(--font-mono);
      font-size: 0.56rem;
      cursor: pointer;
      padding: 0;
      margin-top: 8px;
      display: block;
      letter-spacing: 0.08em;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.2s;
    }
    .ism-edit-btn:hover { color: var(--muted); }

    /* ── ISM override panel ── */
    #ism-input-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
      display: none;
    }
    #ism-input-row label {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.14em;
      display: block;
      margin-bottom: 12px;
      text-transform: uppercase;
    }
    #ism-input-row input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--dim);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.95rem;
      padding: 4px 0;
      width: 80px;
      outline: none;
      transition: border-color 0.2s;
    }
    #ism-input-row input:focus { border-bottom-color: var(--muted); }
    #ism-input-row button {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.62rem;
      cursor: pointer;
      margin-left: 16px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    #ism-input-row button:hover { color: var(--text); }
    #ism-date-note {
      font-family: var(--font-mono);
      font-size: 0.57rem;
      color: var(--dim);
      margin-top: 8px;
    }

    /* ── Footer ── */
    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px;
    }
    #cache-note {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      color: var(--dim);
    }
    #refresh-btn {
      background: none;
      border: none;
      color: var(--dim);
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      cursor: pointer;
      text-transform: uppercase;
      padding: 0;
      transition: color 0.2s;
    }
    #refresh-btn:hover   { color: var(--muted); }
    #refresh-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    /* ── Loader ── */
    #loader {
      text-align: center;
      padding: 100px 0;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--dim);
      letter-spacing: 0.35em;
    }
    #loader .dot { animation: blink 1.4s infinite; }
    #loader .dot:nth-child(2) { animation-delay: 0.45s; }
    #loader .dot:nth-child(3) { animation-delay: 0.9s; }
    @keyframes blink { 0%,80%,100%{opacity:0.1} 40%{opacity:0.85} }
    .hidden { display: none !important; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      #signal-text  { font-size: 5rem; }
      #metrics-grid { grid-template-columns: 1fr; }
      .metric-value { font-size: 1.6rem; }
      header        { margin-bottom: 32px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Makro Signal</div>
  <div id="timestamp">—</div>
</header>

<main>
  <div id="loader">HENTER<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>

  <div id="content" class="hidden">

    <!-- Signal card -->
    <div class="card" id="signal-card">
      <div class="signal-question">Køb ekstra ind i markedet nu?</div>
      <div id="signal-text">—</div>
      <div id="signal-rule"></div>
      <div id="niveau-text"></div>
    </div>

    <!-- Metric cards -->
    <div id="metrics-grid">

      <!-- S&P 500 -->
      <div class="metric-card" id="sp-card">
        <div class="card-label">S&amp;P 500</div>
        <div class="metric-value" id="sp-value">—</div>
        <div class="metric-desc">fra 52-ugers high</div>
        <div class="bar-track"><div class="bar-fill" id="sp-bar" style="width:2%"></div></div>
      </div>

      <!-- Fear & Greed with SVG gauge -->
      <div class="metric-card" id="fg-card">
        <div class="card-label">Fear &amp; Greed</div>
        <div class="metric-value" id="fg-value">—</div>
        <div class="gauge-wrap">
          <svg id="gauge-svg" width="110" height="62" viewBox="0 0 110 62">
            <path id="gauge-track"  d="" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="7" stroke-linecap="round"/>
            <path id="gauge-fill"   d="" fill="none" stroke="#6366f1" stroke-width="7" stroke-linecap="round"/>
            <line id="gauge-needle" x1="55" y1="54" x2="55" y2="20" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" stroke-linecap="round"/>
            <circle id="gauge-dot" cx="55" cy="54" r="2.5" fill="rgba(255,255,255,0.35)"/>
          </svg>
        </div>
        <div class="metric-desc" id="fg-desc">CNN index</div>
      </div>

      <!-- ISM PMI -->
      <div class="metric-card" id="ism-card">
        <div class="card-label">ISM PMI <span class="fred-badge" id="fred-badge" style="display:none">FRED</span></div>
        <div class="metric-value" id="ism-value">—</div>
        <div class="metric-desc">Manufacturing</div>
        <div class="bar-track"><div class="bar-fill" id="ism-bar" style="width:2%"></div></div>
        <button class="ism-edit-btn" onclick="toggleISMInput()">rediger manuelt</button>
      </div>

    </div>

    <!-- ISM override panel -->
    <div id="ism-input-row">
      <label>Manuel override — ISM Manufacturing PMI</label>
      <div>
        <input id="ism-val-input" type="number" step="0.1" min="30" max="70" placeholder="f.eks. 49.3" />
        <button id="ism-save-btn">Gem</button>
      </div>
      <div id="ism-date-note"></div>
    </div>

    <!-- Footer -->
    <div class="footer-row">
      <div id="cache-note"></div>
      <button id="refresh-btn">⟳ Opdater</button>
    </div>

  </div>
</main>

<script>
const CACHE_KEY = 'mks_v3_data';
const ISM_KEY   = 'mks_ism_manual';
const CACHE_TTL = 24 * 60 * 60 * 1000;
const ISM_TTL   = 35 * 24 * 60 * 60 * 1000;

function $(id) { return document.getElementById(id); }

// ── SVG Gauge ───────────────────────────────────────────────────────────────
function describeArc(cx, cy, r, startDeg, endDeg) {
  const toRad = d => (d - 90) * Math.PI / 180;
  const x1 = cx + r * Math.cos(toRad(startDeg));
  const y1 = cy + r * Math.sin(toRad(startDeg));
  const x2 = cx + r * Math.cos(toRad(endDeg));
  const y2 = cy + r * Math.sin(toRad(endDeg));
  const large = Math.abs(endDeg - startDeg) > 180 ? 1 : 0;
  return `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`;
}
function gaugeColor(v) {
  if (v <= 25) return '#ef4444';
  if (v <= 45) return '#f97316';
  if (v <= 55) return '#eab308';
  if (v <= 75) return '#84cc16';
  return '#22c55e';
}
function updateGauge(value) {
  const v = Math.min(100, Math.max(0, value));
  const START = -130, END = 130;
  const angle = START + (v / 100) * (END - START);
  const cx = 55, cy = 54, r = 40;
  $('gauge-track').setAttribute('d', describeArc(cx, cy, r, START, END));
  $('gauge-fill').setAttribute('d', describeArc(cx, cy, r, START, angle));
  $('gauge-fill').setAttribute('stroke', gaugeColor(v));
  const toRad = d => (d - 90) * Math.PI / 180;
  const nx = cx + 30 * Math.cos(toRad(angle));
  const ny = cy + 30 * Math.sin(toRad(angle));
  $('gauge-needle').setAttribute('x2', nx.toFixed(1));
  $('gauge-needle').setAttribute('y2', ny.toFixed(1));
}

// ── Cache ───────────────────────────────────────────────────────────────────
function saveCache(data) {
  localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));
}
function loadCache() {
  try {
    const { ts, data } = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null') || {};
    if (ts && Date.now() - ts < CACHE_TTL) return { data, age: Date.now() - ts };
  } catch(_) {}
  return null;
}
function fmtAge(ms) {
  const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000);
  return h > 0 ? `Cache: ${h}t ${m}m gammel` : `Cache: ${m}m gammel`;
}

// ── ISM manual store ────────────────────────────────────────────────────────
function saveISM(val) {
  localStorage.setItem(ISM_KEY, JSON.stringify({ val, ts: Date.now(), source: 'manual' }));
}
function loadISM() {
  try {
    const obj = JSON.parse(localStorage.getItem(ISM_KEY) || 'null') || {};
    if (obj.val && obj.ts && Date.now() - obj.ts < ISM_TTL)
      return { val: parseFloat(obj.val), ts: obj.ts, source: 'manual' };
  } catch(_) {}
  return null;
}

// ── Proxy fetch ─────────────────────────────────────────────────────────────
async function proxyFetch(url) {
  const res = await fetch(`/api/fetch?url=${encodeURIComponent(url)}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res;
}

// ── Data fetchers ───────────────────────────────────────────────────────────
async function fetchFearGreed() {
  const res  = await proxyFetch('https://production.dataviz.cnn.io/index/fearandgreed/graphdata');
  const json = await res.json();
  const score = json?.fear_and_greed?.score;
  if (score == null) throw new Error('Ingen F&G score');
  return parseFloat(score);
}
async function fetchSP500() {
  const res  = await proxyFetch('https://stooq.com/q/d/l/?s=%5Espx&i=d');
  const text = await res.text();
  const rows = text.trim().split('\n').filter(r => r && !r.startsWith('Date'));
  if (rows.length < 100) throw new Error('For lidt S&P data');
  const closes = rows.map(r => parseFloat(r.split(',')[4]));
  const latest = closes[closes.length - 1];
  const high52 = Math.max(...closes.slice(-252));
  return { latest, high52, drawdown: (latest / high52 - 1) * 100 };
}
async function fetchISM() {
  const url = 'https://api.stlouisfed.org/fred/series/observations' +
    '?series_id=NAPM&file_type=json&sort_order=desc&limit=5';
  const res  = await proxyFetch(url);
  const json = await res.json();
  const obs = json?.observations?.find(o => o.value && o.value !== '.' && !isNaN(parseFloat(o.value)));
  if (!obs) throw new Error('Ingen NAPM data fra FRED');
  return { val: parseFloat(obs.value), ts: new Date(obs.date).getTime(), source: 'auto' };
}

// ── Decision engine ─────────────────────────────────────────────────────────
function computeSignal({ fg, sp, ism }) {
  const spPct  = sp.drawdown;
  const ismVal = ism?.val ?? null;
  const jaConditions  = [ spPct <= -12, fg <= 35, ismVal != null && ismVal <= 48 ];
  const nejConditions = [ spPct > -8,   fg > 45,  ismVal == null || ismVal >= 50 ];
  const isJA  = jaConditions.some(Boolean);
  const isNEJ = nejConditions.every(Boolean);
  let signal  = isJA ? 'JA' : isNEJ ? 'NEJ' : 'VENT';
  let niveau  = '';
  if (spPct <= -25)                  niveau = 'Niveau: Stort';
  else if (spPct <= -18 || fg <= 25) niveau = 'Niveau: 25%';
  else if (isJA)                     niveau = 'Niveau: 12,5%';
  return { signal, niveau };
}

// ── Render ──────────────────────────────────────────────────────────────────
function render({ fg, sp, ism }, fromCache, cacheAge) {
  const { signal, niveau } = computeSignal({ fg, sp, ism });
  const sigKey = signal.toLowerCase();
  const glowMap = { ja: '#22c55e', nej: '#ef4444', vent: '#f59e0b' };
  const glowHex = glowMap[sigKey];

  // Signal
  const sigEl = $('signal-text');
  sigEl.textContent = signal;
  sigEl.className   = `sig-${sigKey}`;
  const rule = $('signal-rule');
  rule.className = `sig-${sigKey}`;
  const sc = $('signal-card');
  sc.style.setProperty('--glow', glowHex);
  sc.setAttribute('data-glow', '1');
  const niv = $('niveau-text');
  niv.textContent = niveau;
  niv.className   = niveau ? 'on' : '';

  // S&P 500
  const spPct    = sp.drawdown;
  const spBarPct = Math.min(100, Math.abs(spPct) / 30 * 100);
  const spCls    = spPct <= -18 ? 'c-warn' : spPct <= -12 ? 'c-mid' : '';
  const spBarCls = spPct <= -18 ? 'warn'   : spPct <= -12 ? 'mid'   : '';
  $('sp-value').textContent = `${spPct.toFixed(1)}%`;
  $('sp-value').className   = `metric-value ${spCls}`;
  $('sp-bar').style.width   = Math.max(2, spBarPct) + '%';
  $('sp-bar').className     = `bar-fill ${spBarCls}`;
  if (spCls) {
    $('sp-card').style.setProperty('--glow', spCls === 'c-warn' ? '#ef4444' : '#f59e0b');
    $('sp-card').setAttribute('data-glow', '1');
  } else {
    $('sp-card').removeAttribute('data-glow');
  }

  // Fear & Greed
  const fgCls = fg <= 25 ? 'c-warn' : fg <= 35 ? 'c-mid' : fg >= 70 ? 'c-ok' : '';
  $('fg-value').textContent = `${fg.toFixed(0)} / 100`;
  $('fg-value').className   = `metric-value ${fgCls}`;
  $('fg-desc').textContent  =
    fg <= 25 ? 'Extrem frygt'    :
    fg <= 45 ? 'Frygt'          :
    fg <= 55 ? 'Neutral'        :
    fg <= 75 ? 'Grådighed'      : 'Extrem grådighed';
  updateGauge(fg);
  if (fgCls) {
    $('fg-card').style.setProperty('--glow', fg <= 35 ? '#ef4444' : '#22c55e');
    $('fg-card').setAttribute('data-glow', '1');
  } else {
    $('fg-card').removeAttribute('data-glow');
  }

  // ISM PMI
  const ismVal    = ism?.val ?? null;
  const ismAge    = ism?.ts ? new Date(ism.ts).toLocaleDateString('da-DK') : null;
  const ismBarPct = ismVal != null ? Math.min(100, Math.max(0, (60 - ismVal) / 15 * 100)) : 0;
  const ismCls    = ismVal == null ? 'c-muted' : ismVal <= 45 ? 'c-warn' : ismVal <= 48 ? 'c-mid' : '';
  const ismBarCls = ismVal == null ? '' : ismVal <= 45 ? 'warn' : ismVal <= 48 ? 'mid' : '';
  $('ism-value').textContent = ismVal != null ? ismVal.toFixed(1) : 'N/A';
  $('ism-value').className   = `metric-value ${ismCls}`;
  $('ism-bar').style.width   = Math.max(2, ismBarPct) + '%';
  $('ism-bar').className     = `bar-fill ${ismBarCls}`;
  $('fred-badge').style.display = ism?.source === 'auto' ? 'inline' : 'none';
  if (ismCls && ismCls !== 'c-muted') {
    $('ism-card').style.setProperty('--glow', ismVal <= 45 ? '#ef4444' : '#f59e0b');
    $('ism-card').setAttribute('data-glow', '1');
  } else {
    $('ism-card').removeAttribute('data-glow');
  }

  // Timestamps + footer
  const now = new Date();
  $('timestamp').textContent  = `${now.toLocaleDateString('da-DK')} ${now.toLocaleTimeString('da-DK', {hour:'2-digit',minute:'2-digit'})}`;
  $('cache-note').textContent = fromCache ? fmtAge(cacheAge) : 'Live data';

  if (ismVal != null) $('ism-val-input').value = ismVal;
  if (ismAge) $('ism-date-note').textContent = `Sidst sat: ${ismAge}`;

  $('loader').classList.add('hidden');
  $('content').classList.remove('hidden');
}

// ── ISM manual input ────────────────────────────────────────────────────────
window.toggleISMInput = function() {
  const row = $('ism-input-row');
  row.style.display = row.style.display === 'block' ? 'none' : 'block';
};
$('ism-save-btn').addEventListener('click', () => {
  const raw = parseFloat($('ism-val-input').value);
  if (isNaN(raw) || raw < 30 || raw > 70) {
    alert('Indtast en gyldig PMI-værdi (30–70)');
    return;
  }
  saveISM(raw);
  $('ism-input-row').style.display = 'none';
  loadData(true);
});

// ── Main load ───────────────────────────────────────────────────────────────
async function loadData(force = false) {
  $('refresh-btn').disabled = true;
  if (!force) {
    const cached = loadCache();
    if (cached) {
      const ism = cached.data.ismAuto || loadISM();
      render(Object.assign({}, cached.data, { ism }), true, cached.age);
      $('refresh-btn').disabled = false;
      return;
    }
  }
  $('loader').classList.remove('hidden');
  $('content').classList.add('hidden');
  try {
    const [fg, sp, ismAuto] = await Promise.all([
      fetchFearGreed(),
      fetchSP500(),
      fetchISM().catch(e => { console.warn('FRED ISM fejlede:', e.message); return null; }),
    ]);
    const ism  = ismAuto || loadISM();
    const data = { fg, sp, ismAuto };
    saveCache(data);
    render(Object.assign({}, data, { ism }), false, 0);
  } catch(err) {
    $('loader').classList.add('hidden');
    const cached = loadCache();
    if (cached) {
      const ism = cached.data.ismAuto || loadISM();
      render(Object.assign({}, cached.data, { ism }), true, cached.age);
    } else {
      $('content').classList.remove('hidden');
      alert(`Datafejl: ${err.message}`);
    }
  } finally {
    $('refresh-btn').disabled = false;
  }
}

$('refresh-btn').addEventListener('click', () => loadData(true));
loadData();
</script>
</body>
</html>
